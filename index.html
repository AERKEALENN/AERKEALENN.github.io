<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERKEALENN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #999;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
                letter-spacing: 0.2em;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <h1>AERKEALENN</h1>
        <p class="subtitle">请输入文本</p>
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 180;
        let triangle = { top: {}, left: {}, right: {} };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initTriangle();
        }

        function initTriangle() {
            const container = document.querySelector('.container');
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2 - 42;
            const size = Math.min(canvas.width, canvas.height) * 0.55;

            triangle = {
                top: { x: centerX, y: centerY - size / 2 },
                left: { x: centerX - size / 2, y: centerY + size / 2 },
                right: { x: centerX + size / 2, y: centerY + size / 2 }
            };
        }

        function getPointOnEdge(t) {
            const totalLength = getEdgeLength('top', 'left') + getEdgeLength('left', 'right') + getEdgeLength('right', 'top');
            let targetDist = t * totalLength;
            let remaining = targetDist;

            if (remaining < getEdgeLength('top', 'left')) {
                const localT = remaining / getEdgeLength('top', 'left');
                return lerp(triangle.top, triangle.left, localT);
            }
            remaining -= getEdgeLength('top', 'left');

            if (remaining < getEdgeLength('left', 'right')) {
                const localT = remaining / getEdgeLength('left', 'right');
                return lerp(triangle.left, triangle.right, localT);
            }
            remaining -= getEdgeLength('left', 'right');

            const localT = remaining / getEdgeLength('right', 'top');
            return lerp(triangle.right, triangle.top, localT);
        }

        function getEdgeLength(p1, p2) {
            return Math.sqrt(Math.pow(triangle[p2].x - triangle[p1].x, 2) + Math.pow(triangle[p2].y - triangle[p1].y, 2));
        }

        function lerp(p1, p2, t) {
            return {
                x: p1.x + (p2.x - p1.x) * t,
                y: p1.y + (p2.y - p1.y) * t
            };
        }

        function distanceToSegment(p, v, w) {
            const l2 = Math.pow(w.x - v.x, 2) + Math.pow(w.y - v.y, 2);
            if (l2 === 0) return Math.sqrt(Math.pow(p.x - v.x, 2) + Math.pow(p.y - v.y, 2));
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return {
                dist: Math.sqrt(Math.pow(p.x - (v.x + t * (w.x - v.x)), 2) + Math.pow(p.y - (v.y + t * (w.y - v.y)), 2)),
                t: t
            };
        }

        function getClosestEdgePoint(p) {
            const edges = [
                { v: triangle.top, w: triangle.left },
                { v: triangle.left, w: triangle.right },
                { v: triangle.right, w: triangle.top }
            ];

            let minDist = Infinity;
            let closest = null;

            edges.forEach(edge => {
                const result = distanceToSegment(p, edge.v, edge.w);
                if (result.dist < minDist) {
                    minDist = result.dist;
                    closest = {
                        x: edge.v.x + result.t * (edge.w.x - edge.v.x),
                        y: edge.v.y + result.t * (edge.w.y - edge.v.y)
                    };
                }
            });

            return closest;
        }

        function createParticles() {
            particles = [];
            const spread = 50;

            for (let i = 0; i < particleCount; i++) {
                const t = i / particleCount;
                const pos = getPointOnEdge(t);
                const closest = getClosestEdgePoint(pos);

                const toCenter = {
                    x: canvas.width / 2 - closest.x,
                    y: canvas.height / 2 - closest.y
                };
                const len = Math.sqrt(toCenter.x * toCenter.x + toCenter.y * toCenter.y);

                const offset = (Math.random() - 0.5) * spread;

                particles.push({
                    x: closest.x + (toCenter.x / len) * offset,
                    y: closest.y + (toCenter.y / len) * offset,
                    basePos: { x: closest.x, y: closest.y },
                    baseOffset: offset,
                    vx: 0,
                    vy: 0,
                    size: Math.random() * 1.5 + 0.8,
                    opacity: Math.random() * 0.3 + 0.2,
                    phase: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.5 + 0.3,
                    isWild: Math.random() < 0.15
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const time = Date.now() * 0.001;

            particles.forEach(p => {
                const closest = getClosestEdgePoint({ x: p.x, y: p.y });
                const dist = Math.sqrt(
                    Math.pow(p.x - closest.x, 2) +
                    Math.pow(p.y - closest.y, 2)
                );

                const toCenter = {
                    x: closest.x - canvas.width / 2,
                    y: closest.y - canvas.height / 2
                };
                const len = Math.sqrt(toCenter.x * toCenter.x + toCenter.y * toCenter.y);
                const normalX = toCenter.x / len;
                const normalY = toCenter.y / len;

                if (p.isWild) {
                    p.phase += 0.03;
                    const wander = Math.sin(p.phase) * 0.8;

                    const tangentX = -normalY;
                    const tangentY = normalX;

                    p.vx = tangentX * wander * p.speed + normalX * Math.sin(p.phase * 0.7) * p.speed * 0.5;

                    if (dist > 30) {
                        const pullBack = (dist - 30) * 0.08;
                        p.vx -= normalX * pullBack * 0.5;
                    }

                    p.vx *= 0.98;
                } else {
                    p.phase += p.speed * 0.04;

                    const wobble = Math.sin(p.phase) * 8;
                    const targetX = closest.x + normalX * p.baseOffset + normalX * wobble;
                    const targetY = closest.y + normalY * p.baseOffset + normalY * wobble;

                    p.vx = (targetX - p.x) * 0.08;
                    p.vy = (targetY - p.y) * 0.08;
                }

                p.vx *= 0.96;
                p.vy *= 0.96;

                p.vx = Math.max(-2, Math.min(2, p.vx));
                p.vy = Math.max(-2, Math.min(2, p.vy));

                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    p.x = closest.x;
                    p.y = closest.y;
                    p.vx = 0;
                    p.vy = 0;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(80, 80, 80, ${p.opacity})`;
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('load', () => {
            resize();
            createParticles();
            animate();
        });

        window.addEventListener('resize', () => {
            resize();
            createParticles();
        });
    </script>
</body>
</html>
